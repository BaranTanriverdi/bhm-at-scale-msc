ai: {}
business:
  executiveSummary: >-
    This repository implements a scalable Bayesian hierarchical model for daily store-level sales forecasting,
    accompanying the blog post "Finally! Bayesian Hierarchical Modelling at Scale". It uses JAX and NumPyro to fit a
    Gamma-Poisson model that pools information across many retail stores while retaining store-specific effects. Data is
    downloaded from the Rossmann store sales Kaggle dataset, preprocessed into a feature cube, and trained using
    stochastic variational inference. The notebooks demonstrate end-to-end preprocessing, model fitting, posterior
    analysis, and comparison against a conventional linear regression baseline. The project is intended as reproducible,
    research-grade code rather than a production deployment.
  hazardousUseCases: []
  intendedUse: >-
    The intended use of this repository is to serve as a reproducible, educational example of Bayesian hierarchical
    modelling at scale, showing how to implement a Gamma-Poisson sales forecasting model with JAX/NumPyro on the
    Rossmann store sales dataset. It is meant for experimentation in notebooks, methodological exploration, and as a
    template for adapting similar probabilistic models to other tabular time-series problems.
  kpis: []
  nonGoals: []
  outOfScopeUse: []
  useCase: >-
    Forecasting daily sales for many retail stores using a Bayesian hierarchical Gamma-Poisson model that shares
    statistical strength across stores while capturing store-specific effects, demonstrated on the Rossmann store sales
    Kaggle dataset.
  userPopulations:
    - Data scientists and statisticians interested in Bayesian hierarchical models for time-series and count data.
    - >-
      Machine learning researchers and engineers experimenting with scalable probabilistic programming using JAX and
      NumPyro.
devInsight:
  architecture:
    dataFlow: []
    depsSummary: []
    publicApis: []
  codeOverview:
    components:
      - keyFiles:
          - notebooks/01-preprocessing.ipynb
          - src/bhm_at_scale/preprocess.py
          - src/bhm_at_scale/utils.py
        name: Data preprocessing and feature cube construction
        summary: >-
          Loads Rossmann store and sales CSVs from Kaggle, performs cleansing and basic feature engineering with pandas,
          dummy-encodes categorical variables, and reshapes the data into a StoreId × Timestep feature cube suitable for
          hierarchical modelling.
      - keyFiles:
          - src/bhm_at_scale/model.py
          - notebooks/02-model.ipynb
        name: Gamma-Poisson hierarchical sales model
        summary: >-
          Defines a Gamma-Poisson hierarchical model for daily store sales and its variational guides using NumPyro
          primitives, including global and per-store coefficients and dispersion parameters, plus helpers for predictive
          inference and local adaptation to new stores.
      - keyFiles:
          - src/bhm_at_scale/handler.py
          - notebooks/02-model.ipynb
        name: Model training and SVI handler
        summary: >-
          Wraps NumPyro’s SVI API in a ModelHandler class that manages optimizer state, training loops, logging,
          checkpointing of optimizer state, and convenient prediction via Predictive for arbitrary input tensors.
      - keyFiles:
          - notebooks/03-evaluation.ipynb
          - src/bhm_at_scale/plot.py
        name: Evaluation and visualization
        summary: >-
          Reads posterior summaries and predictions, visualises store-level sales histories with promotion and holiday
          overlays, and plots global weekday and promotion effects to compare hierarchical estimates with per-store
          coefficients.
    entrypoints:
      - notebooks/01-preprocessing.ipynb
      - notebooks/02-model.ipynb
      - notebooks/03-evaluation.ipynb
    languages:
      - Python
      - Jupyter Notebook
